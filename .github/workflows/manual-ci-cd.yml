name: Manual CI/CD (Tracking Service)

on:
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "Run deploy placeholder"
        required: false
        default: false
        type: boolean

concurrency:
  group: tracking-manual-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Install and Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check JavaScript files
        run: |
          find . -type f -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node --check

  deploy:
    name: Deploy Placeholder
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ inputs.run_deploy }}
    steps:
      - name: Deployment disabled by default
        run: |
          echo "Manual deploy placeholder."
          echo "Add your real deployment steps/secrets when ready for production."
